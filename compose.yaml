services:
  # --- Next.js standalone (Dockerfile) ---
  nextjs-prod-standalone:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-reactjs-sample:nextjs-prod
    container_name: nextjs-sample-prod
    ports:
      - "3000:3000"

  # --- Next.js static export + Nginx (alternative to nextjs-export, port 8081) ---
  nextjs-prod-static-nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: docker-reactjs-sample:static-nginx
    container_name: static-sample-nginx
    ports:
      - "8080:8080"

  # --- Next.js static export + Node serve (port 8082) ---
  nextjs-prod-static-serve:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: docker-reactjs-sample:static-serve
    container_name: static-sample-serve
    ports:
      - "8080:8080"

  # --- Next.js development (Dockerfile.dev) ---
  nextjs-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: docker-reactjs-sample:nextjs-dev
    container_name: nextjs-sample-dev
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json

  # --- Next.js static export + Nginx (Dockerfile.export) ---
  nextjs-export:
    build:
      context: .
      dockerfile: Dockerfile.export
    image: docker-reactjs-sample:nextjs-export
    container_name: nextjs-sample-export
    ports:
      - "8080:8080"

  nextjs-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: docker-reactjs-sample:nextjs-dev
    container_name: nextjs-sample-test
    command:
      [
        "sh",
        "-c",
        "if [ -f package-lock.json ]; then npm run test:run 2>/dev/null || npm run test -- --run; elif [ -f yarn.lock ]; then yarn test:run 2>/dev/null || yarn test --run; elif [ -f pnpm-lock.yaml ]; then pnpm run test:run; else npm run test -- --run; fi",
      ]
    profiles:
      - tools

  nextjs-lint:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: docker-reactjs-sample:nextjs-dev
    container_name: nextjs-sample-lint
    command:
      [
        "sh",
        "-c",
        "if [ -f package-lock.json ]; then npm run lint; elif [ -f yarn.lock ]; then yarn lint; elif [ -f pnpm-lock.yaml ]; then pnpm lint; else npm run lint; fi",
      ]
    profiles:
      - tools
