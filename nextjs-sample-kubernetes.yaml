# Kubernetes manifest for Next.js application (Docker Desktop or any cluster)
#
# Local:  docker build -t nextjs-sample:latest -f Dockerfile .  then  kubectl apply -f nextjs-sample-kubernetes.yaml
# Prod:   Set image to your Docker Hub image (e.g. myuser/nextjs-sample:latest) and imagePullPolicy: Always
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-sample
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs-sample
  template:
    metadata:
      labels:
        app: nextjs-sample
    spec:
      containers:
        - name: nextjs-container
          image: nextjs-sample:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-sample-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: nextjs-sample
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
