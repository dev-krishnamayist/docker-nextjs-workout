version: "3"

vars:
  IMAGE_NAME: nextjs-sample
  IMAGE_TAG: latest
  CONTAINER_NAME: nextjs-sample-container
  HOST_PORT: 3000
  CONTAINER_PORT: 3000
  DOCKERFILE: Dockerfile
  K8S_MANIFEST: nextjs-sample-kubernetes.yaml

tasks:
  build:
    desc: "Build Next.js standalone Docker image"
    cmds:
      - docker build -f {{.DOCKERFILE}} -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} .

  build-export:
    desc: "Build Next.js static export Docker image (Nginx)"
    cmds:
      - docker build -f Dockerfile.export -t nextjs-export:latest .

  build-dev:
    desc: "Build Next.js development Docker image"
    cmds:
      - docker build -f Dockerfile.dev -t nextjs-dev:latest .

  run:
    desc: "Run Next.js standalone container"
    cmds:
      - docker rm -f {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker run -d --name {{.CONTAINER_NAME}} -p {{.HOST_PORT}}:{{.CONTAINER_PORT}} {{.IMAGE_NAME}}:{{.IMAGE_TAG}}

  run-export:
    desc: "Run Next.js static export container (port 8080)"
    cmds:
      - docker rm -f nextjs-export-container 2>/dev/null || true
      - docker run -d --name nextjs-export-container -p 8080:8080 nextjs-export:latest

  build-run:
    desc: "Build and run Next.js standalone in one step"
    cmds:
      - task: build
      - task: run

  stop:
    desc: "Stop the running standalone container"
    cmds:
      - docker stop {{.CONTAINER_NAME}} 2>/dev/null || true

  stop-export:
    desc: "Stop the static export container"
    cmds:
      - docker stop nextjs-export-container 2>/dev/null || true

  logs:
    desc: "Show logs from standalone container"
    cmds:
      - docker logs -f {{.CONTAINER_NAME}}

  compose-up-standalone:
    desc: "Start Next.js standalone with Docker Compose"
    cmds:
      - docker compose up nextjs-prod-standalone --build

  compose-up-dev:
    desc: "Start Next.js dev with Docker Compose (watch)"
    cmds:
      - docker compose watch nextjs-dev

  compose-up-export:
    desc: "Start Next.js static export with Docker Compose"
    cmds:
      - docker compose up nextjs-export --build

  compose-down:
    desc: "Stop all Compose services"
    cmds:
      - docker compose down

  test:
    desc: "Run tests locally"
    cmds:
      - pnpm run test:run

  test-docker:
    desc: "Run tests in Docker"
    cmds:
      - docker compose --profile tools run --rm nextjs-test

  lint:
    desc: "Run ESLint locally"
    cmds:
      - pnpm run lint

  lint-docker:
    desc: "Run ESLint in Docker"
    cmds:
      - docker compose --profile tools run --rm nextjs-lint

  k8s-apply:
    desc: "Build image and apply Kubernetes manifest"
    cmds:
      - task: build
      - kubectl apply -f {{.K8S_MANIFEST}}

  k8s-delete:
    desc: "Delete Kubernetes resources"
    cmds:
      - kubectl delete -f {{.K8S_MANIFEST}}

  k8s-status:
    desc: "Show Kubernetes deployment and pod status"
    cmds:
      - kubectl get deployment nextjs-sample
      - kubectl get pods -l app=nextjs-sample
      - kubectl get service nextjs-sample-service

  clean:
    desc: "Remove container and image"
    cmds:
      - docker rm -f {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker rmi {{.IMAGE_NAME}}:{{.IMAGE_TAG}} 2>/dev/null || true

  default:
    desc: "Show available tasks"
    cmds:
      - task --list
